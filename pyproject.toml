[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_settings"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "settings feature"

[tool.splent.contract.provides]
routes     = ["/admin/settings", "/admin/settings/<feature>"]
blueprints = []
models     = ["Setting"]
commands   = ["hello"]
hooks      = ["layout.authenticated_sidebar"]
services   = ["SettingsService"]
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["SettingsService"]
templates = ["settings/admin/feature.html", "settings/admin/index.html", "settings/index.html"]
models    = ["Setting"]
hooks     = ["layout.authenticated_sidebar"]
routes    = false
